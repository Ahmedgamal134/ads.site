<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة إعلان - بوت الربح</title>
    <style>
        /* نفس الـ CSS القديم */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
        }
        .timer {
            font-size: 72px;
            font-weight: bold;
            margin: 30px 0;
            color: #ffd700;
        }
        .message {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 بوت الربح الذكي</h1>
        
        <div class="message">
            <h2>📺 شاهد الإعلان واكسب نقاط</h2>
            <p>انتظر 15 ثانية بعد مشاهدة الإعلان</p>
        </div>
        
        <div class="timer" id="timer">15</div>
        
        <!-- كود Ezmob الأول (فيديو) -->
        <script type="text/javascript" src="https://docdn.ezmob.com/prebid.js" async></script>
        <script>
            var pbjs = pbjs || {};
            pbjs.que = pbjs.que || [];
            
            pbjs.que.push(function() {
                var adUnits = [{
                    code: 'container-1',
                    mediaTypes: {
                        video: {
                            context: 'outstream',
                            playerSize: [300, 250],
                            renderer: {
                                url: 'https://docdn.ezmob.com/outstream_pb.js',
                                render: renderOutstream
                            }
                        }
                    },
                    bids: [{
                        bidder: 'adkernel',
                        params: {
                          zoneId: 341887,
                          host: 'cpm.ezmob.com'
                        }

                    }]
                }];
                pbjs.addAdUnits(adUnits);
                pbjs.requestBids({
                    bidsBackHandler: function(bidResponses) {
                        process('container-1');
                    }
                });
            });

            function process(adUnit) {
                var bidResponses = pbjs.getHighestCpmBids(adUnit);
                if (bidResponses.length == 0) {
                    return;
                }
                var bid = bidResponses[0];
                pbjs.renderAd(document, bid.adId);
            }
            
            function renderOutstream(bid) {
                OutstreamPlayerPB(bid, {
                    displayMode: 'floating',
                    transitions: true,
                    vpaidMode: 2
                });
            }
        </script>
        <div id="container-1"></div>

        <!-- كود Ezmob التاني (بانر) -->
        <script type="text/javascript">
            var __jscp=function(){for(var b=0,a=window;a!=a.parent;)++b,a=a.parent;if(a=window.parent==window?document.URL:document.referrer){var c=a.indexOf("://");0<=c&&(a=a.substring(c+3));c=a.indexOf("/");0<=c&&(a=a.substring(0,c))}var b={pu:a,"if":b,rn:new Number(Math.floor(99999999*Math.random())+1)},a=[],d;for(d in b)a.push(d+"="+encodeURIComponent(b[d]));return encodeURIComponent(a.join("&"))};
            document.write('<S' + 'CRIPT TYPE="text/javascript" SRC="//cpm.ezmob.com/tag?zone_id=341886&size=300x250&subid=&j=' + __jscp() + '"></S' + 'CRIPT>');
        </script>
        
        <div class="message" id="status">
            شاهد الإعلان وانتظر...
        </div>
    </div>
    
    <script>
        let timeLeft = 15;
        const timerElement = document.getElementById('timer');
        const statusElement = document.getElementById('status');
        
        const timer = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerElement.style.display = 'none';
                statusElement.innerHTML = '✅ تمت المشاهدة! يمكنك العودة للبوت لاستلام نقاطك';
            }
        }, 1000);
    </script>
</body>
</html>
